<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Add this to the <head> section of your HTML -->
<script src="https://apis.google.com/js/platform.js" async defer></script>
<!-- Add your OAuth client ID -->
<meta name="google-signin-client_id" content="989051664876-qp90oll17moh96j2e7u7r6drq8stkvu7.apps.googleusercontent.com">

</head>
<body>
    <div class="g-signin2" data-onsuccess="onSignIn"></div>

    <script>
        function onSignIn(googleUser) {
          // Retrieve user information
          var profile = googleUser.getBasicProfile();
          console.log('ID: ' + profile.getId());
          console.log('Name: ' + profile.getName());
          console.log('Image URL: ' + profile.getImageUrl());
          console.log('Email: ' + profile.getEmail());
        
          // You can now use this information to authenticate the user in your application
        }
        </script>
</body>
</html>
